<div class="container">
    <div class="clientsList">
      <fieldset class="body">
        <legend class="title">Especialidades</legend>

        <div class="table-wrapper" style="position: relative; min-height: 300px;">
          <app-loader [isLoading]="isLoading()" mode="component"></app-loader>
                 <div class="table"> 
        @if(
      specialities$ | async
      ; as state) {
      <p-table
        #dt1
        dataKey="idEvento"
        [value]='state'
        [rows]="10"
        [paginator]="true"
        [globalFilterFields]="['Titulo', 'Especialidad']"
        styleClass="ml-3 mr-3"
        >
        <ng-template pTemplate="caption"d let-event>
          <div class="flex-row">
            <div class="p-toolbar-group-end">
              <span class="p-input-icon-left ml-auto">
                <i class=""></i>
                <input
                class="search"
                #searchInput
                pInputText
                type="text"
                placeholder="BUSCAR"
                (input)="dt1.filterGlobal(searchInput.value, 'contains')"
              />
                </span>
            </div>
          </div>
          </ng-template>
          <ng-template pTemplate="header">
            <tr>
              <th style="min-width: 1rem" class="border">
                <div class="flex thstyles">TITULO</div>
              </th>
              <th style="min-width: 8rem">
                <div class="flex thstyles">ESPECIALIDAD</div>
              </th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-speciality class="p-table">
            <tr class="table-content" 
            (click)=" onSelectedSpeciality(speciality)" 
            [class.disabled]="isEnabled" 
            [class.selected]="selectedSpeciality === speciality" >
              <td>
                {{ speciality.Titulo }}
              </td>
              <td>
                {{ speciality.Especialidad }}
              </td>
            </tr>
          </ng-template>
          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="7">No elementos encontrados.</td>
            </tr>
          </ng-template>
        </p-table>
      }
    </div>
        </div>

      </fieldset>

    </div>

    <div class="clientForm">
        <form [formGroup]="specialititesForm" autocomplete="off">
            <div class="inputGroup">
                <label for="identification">TITULO</label>
                <input type="text" id="identification" name="identification" formControlName="Titulo" appUppercase>
            </div>

            <div class="inputGroup">
                <label for="name">DESCRIPCIÓN</label>
                <textarea id="name" name="name" formControlName="Especialidad" appUppercase></textarea>
            </div>
        </form>

        <div class="buttons">
          <!-- <div class="icon" title="Buscar">
            <i class="pi pi-search searchIcon"></i>
          </div> -->

          <div class="icons">
            <div class="icon" title="Agregar" (click)="onAdd()" [class.disabled]="isAdding">
              <i class="pi pi-plus add"></i>
            </div>

            <div class="icon" title="Guardar" (click)="onSave()" [class.disabled]="!isAdding">
              <i class="pi pi-save save"></i>
            </div>

            <div class="icon" title="Eliminar" (click)="onDelete()"  [class.disabled]="!selectedSpeciality" >
              <i class="pi pi-trash delete"></i>
            </div>
          </div>

          <div class="icon" title="Cancelar" (click)="onCancel()">
            <i class="pi pi-times cancel"></i>
          </div>
        </div>
    </div>
</div>
